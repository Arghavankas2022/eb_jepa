meta:
  device: cuda
  seed: 42
  output_dir: output/cell_jepa_balanced_25_25

data:
  h5ad_path: /mlbio_scratch/kassraie/World_Model_Cell_Fate/Data_pairs/Pairs/Subset_4/subset4_forward.h5ad
  pairs_path: /mlbio_scratch/kassraie/World_Model_Cell_Fate/Data_pairs/Pairs/Subset_4/pairs_forward_local.npy
  batch_size: 128
  num_workers: 4

model:
  hidden_dim: 1024
  embed_dim: 256
  pred_hidden_dim: 512
  proj_hidden_dim: 4096 #maybe drop this to 1024
  proj_output_dim: 4096

optim:
  lr: 0.0005
  weight_decay: 0.00001
  epochs: 10
  use_cosine: true

loss:
  std_coeff: 10
  cov_coeff: 50
  pred_coeff: 10.0  # cosine loss ~0.01-0.02; needs 10x to balance vicreg ~0.5
  vicreg_lambda: 1.0

logging:
  log_wandb: true
  log_every: 1
  save_every: 5
